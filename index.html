<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>键盘侠</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="blocker">
    <div id="menu">
      <h1>键盘侠</h1>
      <p class="controls">
        <b>操作说明</b><br>
        WASD - 移动 | 鼠标 - 瞄准<br>
        左键 - 射击 | R - 换弹<br>
        Space - 跳跃 | Shift - 冲刺
      </p>
      <button id="playBtn">点击开始</button>
      <button id="mapBtn">地图选择</button>
      <button id="rankBtn">排行榜</button>
      <button id="multiBtn">联机模式</button>
    </div>
  </div>

  <!-- 玩家名输入 -->
  <div id="name-overlay" class="hidden">
    <div id="name-box">
      <div id="name-title">输入你的昵称</div>
      <input id="name-input" type="text" maxlength="12" value="Player1" />
      <button id="name-confirm">确认进入</button>
    </div>
  </div>

  <!-- 地图选择 -->
  <div id="map-overlay" class="hidden">
    <div id="map-box">
      <div id="map-title">选择地图</div>
      <div id="map-cards">
        <div class="map-card selected" data-map="1">
          <div class="map-preview">🏭</div>
          <div class="map-name">工业基地</div>
          <div class="map-desc">开阔场地 + 中央建筑，适合新手</div>
        </div>
        <div class="map-card" data-map="2">
          <div class="map-preview">🏜️</div>
          <div class="map-name">沙漠要塞</div>
          <div class="map-desc">长廊通道 + 室内CQB，经典Dust风格</div>
        </div>
      </div>
      <button id="map-confirm">确认选择</button>
    </div>
  </div>

  <!-- 排行榜 -->
  <div id="rank-overlay" class="hidden">
    <div id="rank-box">
      <div id="rank-title">🏆 排行榜</div>
      <div id="rank-list"></div>
      <button id="rank-close">返回</button>
    </div>
  </div>

  <!-- 联机大厅 -->
  <div id="lobby-overlay" class="hidden">
    <div id="lobby-box">
      <div id="lobby-title">联机大厅</div>
      <div id="lobby-connection">
        <label>服务器地址</label>
        <input id="server-ip" type="text" value="ws://localhost:8080" />
        <button id="connect-btn">连接</button>
      </div>
      <div id="lobby-status" style="color:#aaa;font-size:14px;margin:8px 0"></div>
      <div id="lobby-rooms" class="hidden">
        <div id="room-list"></div>
        <button id="create-room-btn">创建房间</button>
      </div>
      <div id="lobby-room" class="hidden">
        <div id="room-title">房间: <span id="room-id"></span></div>
        <div id="room-players"></div>
        <div id="room-controls">
          <select id="room-map-select">
            <option value="1">工业基地</option>
            <option value="2">沙漠要塞</option>
          </select>
          <button id="room-start-btn" class="hidden">开始游戏</button>
        </div>
        <button id="leave-room-btn">离开房间</button>
      </div>
      <button id="lobby-back">返回</button>
    </div>
  </div>

  <div id="hud">
    <div id="crosshair">
      <div class="ch-line ch-top"></div>
      <div class="ch-line ch-bottom"></div>
      <div class="ch-line ch-left"></div>
      <div class="ch-line ch-right"></div>
      <div class="ch-dot"></div>
    </div>
    <div id="health-bar">
      <div id="health-icon">+</div>
      <div id="health-fill"><div id="health-bar-inner"></div></div>
      <span id="health-text">100</span>
    </div>
    <div id="ammo-display">
      <span id="ammo-current">30</span>
      <span id="ammo-sep">/</span>
      <span id="ammo-reserve">90</span>
    </div>
    <div id="weapon-name">AK-47</div>
    <div id="player-name-display"></div>
    <div id="score-display">击杀: <span id="score">0</span></div>
    <div id="hit-marker" class="hidden">X</div>
    <div id="damage-overlay" class="hidden"></div>
    <div id="kill-feed"></div>
    <div id="reload-indicator" class="hidden">换弹中...</div>
    <div id="wave-overlay" class="hidden">
      <div id="wave-text"></div>
    </div>
    <div id="wave-hud">
      <span id="wave-num">1</span>
      <span id="wave-label">波</span>
      <span id="wave-sep">|</span>
      <span id="wave-enemies-icon">☠</span>
      <span id="wave-enemies">0</span>
    </div>

    <!-- 奖励选择 -->
    <div id="reward-overlay" class="hidden">
      <div id="reward-title">波次完成！选择一项奖励</div>
      <div id="reward-chests">
        <div class="reward-chest" data-idx="0"><div class="chest-icon">📦</div><div class="chest-name"></div><div class="chest-desc"></div></div>
        <div class="reward-chest" data-idx="1"><div class="chest-icon">📦</div><div class="chest-name"></div><div class="chest-desc"></div></div>
        <div class="reward-chest" data-idx="2"><div class="chest-icon">📦</div><div class="chest-name"></div><div class="chest-desc"></div></div>
      </div>
      <div id="reward-skip">放弃宝箱</div>
    </div>

    <!-- 护盾 HUD -->
    <div id="shield-bar" class="hidden">
      <div id="shield-icon">🛡</div>
      <div id="shield-fill"><div id="shield-bar-inner"></div></div>
      <span id="shield-text">0</span>
    </div>
  </div>

  <script>
    (function() {
      document.getElementById('playBtn').addEventListener('click', function() {
        document.getElementById('blocker').style.display = 'none';
        document.getElementById('name-overlay').classList.remove('hidden');
        document.getElementById('name-input').focus();
        document.getElementById('name-input').select();
      });
      document.getElementById('name-confirm').addEventListener('click', function() {
        var name = document.getElementById('name-input').value.trim() || 'Player1';
        document.getElementById('name-overlay').classList.add('hidden');
        document.getElementById('player-name-display').textContent = name;
        if (window.__startGame) {
          window.__startGame(name);
        } else {
          window.__gameStartPending = true;
          window.__pendingName = name;
        }
      });
      document.getElementById('name-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('name-confirm').click();
      });
      document.getElementById('rankBtn').addEventListener('click', function() {
        window.__showRank && window.__showRank();
      });
      document.getElementById('rank-close').addEventListener('click', function() {
        document.getElementById('rank-overlay').classList.add('hidden');
      });
      // 地图选择
      document.getElementById('mapBtn').addEventListener('click', function() {
        document.getElementById('map-overlay').classList.remove('hidden');
      });
      document.querySelectorAll('.map-card').forEach(function(card) {
        card.addEventListener('click', function() {
          document.querySelectorAll('.map-card').forEach(function(c) { c.classList.remove('selected'); });
          card.classList.add('selected');
        });
      });
      document.getElementById('map-confirm').addEventListener('click', function() {
        var sel = document.querySelector('.map-card.selected');
        var mapId = sel ? parseInt(sel.dataset.map) : 1;
        document.getElementById('map-overlay').classList.add('hidden');
        if (window.__selectMap) window.__selectMap(mapId);
      });

      // ── 联机大厅 ──
      function renderRoomList(rooms) {
        var listDiv = document.getElementById('room-list');
        listDiv.innerHTML = '';
        if (!rooms || rooms.length === 0) {
          listDiv.innerHTML = '<div style="color:#666;font-size:14px;padding:16px 0;text-align:center">暂无房间，请创建一个</div>';
          return;
        }
        rooms.forEach(function(r) {
          var item = document.createElement('div');
          item.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin:4px 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;cursor:pointer;transition:border-color .2s';
          var stateText = r.gameState === 'lobby' ? '等待中' : '游戏中';
          var stateColor = r.gameState === 'lobby' ? '#4f4' : '#f55';
          item.innerHTML = '<span style="color:#fff;font-size:15px;font-weight:600">房间 ' + r.id + '</span>' +
            '<span style="color:#aaa;font-size:13px">' + r.playerCount + ' 人</span>' +
            '<span style="color:' + stateColor + ';font-size:13px">' + stateText + '</span>';
          if (r.gameState === 'lobby') {
            item.style.cursor = 'pointer';
            item.addEventListener('mouseenter', function() { item.style.borderColor = '#f0c040'; });
            item.addEventListener('mouseleave', function() { item.style.borderColor = 'rgba(255,255,255,.1)'; });
            item.addEventListener('click', function() {
              var name = document.getElementById('name-input').value.trim() || 'Player1';
              window.netClient.join(name, r.id);
            });
          } else {
            item.style.opacity = '0.5';
            item.style.cursor = 'not-allowed';
          }
          listDiv.appendChild(item);
        });
      }

      function setupLobbyCallbacks(nc) {
        nc.onRoomList = function(msg) {
          renderRoomList(msg.rooms);
        };
        nc.onJoined = function(msg) {
          if (msg.error) {
            document.getElementById('lobby-status').textContent = msg.error;
            document.getElementById('lobby-status').style.color = '#f44';
            return;
          }
          console.log('[大厅] 已加入房间:', msg.roomId, '玩家:', msg.players.length);
          document.getElementById('lobby-rooms').classList.add('hidden');
          document.getElementById('lobby-room').classList.remove('hidden');
          document.getElementById('room-id').textContent = msg.roomId;
          var playersDiv = document.getElementById('room-players');
          playersDiv.innerHTML = '';
          msg.players.forEach(function(p) {
            var el = document.createElement('div');
            el.style.cssText = 'padding:6px 0;color:#fff;font-size:15px';
            el.textContent = p.name + (p.isHost ? ' (房主)' : '');
            el.id = 'room-player-' + p.id;
            playersDiv.appendChild(el);
          });
          if (msg.isHost) {
            document.getElementById('room-start-btn').classList.remove('hidden');
          }
        };
        nc.onPlayerJoined = function(msg) {
          console.log('[大厅] 玩家加入:', msg.name);
          var playersDiv = document.getElementById('room-players');
          var el = document.createElement('div');
          el.style.cssText = 'padding:6px 0;color:#fff;font-size:15px';
          el.textContent = msg.name;
          el.id = 'room-player-' + msg.id;
          playersDiv.appendChild(el);
        };
        nc.onPlayerLeft = function(msg) {
          var el = document.getElementById('room-player-' + msg.id);
          if (el) el.remove();
        };
      }

      // 如果 client.js 已加载，立即设置回调
      if (window.netClient) setupLobbyCallbacks(window.netClient);

      document.getElementById('multiBtn').addEventListener('click', function() {
        document.getElementById('blocker').style.display = 'none';
        document.getElementById('lobby-overlay').classList.remove('hidden');
      });
      document.getElementById('lobby-back').addEventListener('click', function() {
        document.getElementById('lobby-overlay').classList.add('hidden');
        document.getElementById('blocker').style.display = 'flex';
        if (window.netClient && window.netClient.connected) {
          window.netClient.disconnect();
        }
        // 重置大厅 UI
        document.getElementById('lobby-connection').style.display = '';
        document.getElementById('lobby-rooms').classList.add('hidden');
        document.getElementById('lobby-room').classList.add('hidden');
        document.getElementById('lobby-status').textContent = '';
      });
      document.getElementById('connect-btn').addEventListener('click', function() {
        var url = document.getElementById('server-ip').value.trim();
        if (!url) return;
        var status = document.getElementById('lobby-status');
        status.textContent = '连接中...';
        status.style.color = '#aaa';
        var nc = window.netClient;
        if (!nc.onJoined) setupLobbyCallbacks(nc);
        nc.connect(url).then(function() {
          status.textContent = '已连接';
          status.style.color = '#4f4';
          document.getElementById('lobby-connection').style.display = 'none';
          document.getElementById('lobby-rooms').classList.remove('hidden');
        }).catch(function(e) {
          status.textContent = '连接失败: ' + (e.message || '无法连接服务器');
          status.style.color = '#f44';
        });
      });
      document.getElementById('create-room-btn').addEventListener('click', function() {
        var name = document.getElementById('name-input').value.trim() || 'Player1';
        window.netClient.join(name);
      });
      document.getElementById('room-start-btn').addEventListener('click', function() {
        var mapId = parseInt(document.getElementById('room-map-select').value);
        window.netClient.startGame(mapId);
      });
      document.getElementById('leave-room-btn').addEventListener('click', function() {
        var nc = window.netClient;
        if (nc && nc.connected) {
          nc.disconnect();
        }
        document.getElementById('lobby-room').classList.add('hidden');
        document.getElementById('lobby-rooms').classList.remove('hidden');
        document.getElementById('lobby-status').textContent = '已断开，请重新连接';
        document.getElementById('lobby-status').style.color = '#aaa';
        document.getElementById('lobby-connection').style.display = '';
      });
    })();
  </script>

  <script src="js/lib/three.min.js"></script>
  <script src="js/net/client.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
